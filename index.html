<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
/>


<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="swiper-container swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide">1</div>
            <div class="swiper-slide">2</div>
            <div class="swiper-slide">3</div>
            <div class="swiper-slide">4</div>
            <div class="swiper-slide">5</div>
            <div class="swiper-slide">6</div>
            <div class="swiper-slide">7</div>
            <div class="swiper-slide">8</div>
            <div class="swiper-slide">9</div>
            <div class="swiper-slide">10</div>
        </div>

        <div class="swiper-pagination"></div>
        <div class="swiper-button-next"></div>
        <div class="swiper-button-prev"></div>
    </div>










 <script>
   document.addEventListener('DOMContentLoaded', function(){
     var swiper = new Swiper('.swiper-container', {
        slidesPerView: 1, //qtnd de sliders mostrado por vez
        spaceBetween: 2, //espaco entre eles
        loop: true,
        pagination:{
            el: '.swiper-pagination'
        },
        navigation:{
            nextEl: '.swiper-button-next',
            prevEl: '.swiper-button-prev',
        },
        // autoplay:true, //passa sozinho
        autoplay:{
            delay: 1000,
            disableOnInteraction:true, //se o usuario clicar no slider ele para
            pauseOnMouseEnter: true, //quando o mouse passa ele para a animação
        },
        

        breakpoint:{ //responsividade
            600:{
               slidesPerView: 2,
                spaceBetween: 2,
            }, 
            1024:{
               slidesPerView: 3,
                spaceBetween: 2,
            }
        }
    });

   })
 </script>   
</body>
</html>
